name: fast_delivery_orders
description: Shared orders list feature for Fast Delivery apps
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Shared packages
  fast_delivery_core:
    path: ../core
  fast_delivery_auth:
    path: ../auth

  # Firebase
  cloud_firestore: ^5.6.7

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Utilities
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.5.4
  riverpod_generator: ^2.6.5
  freezed: ^3.1.0
  json_serializable: ^6.9.4
